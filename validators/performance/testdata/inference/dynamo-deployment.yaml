# Dynamo inference workload for performance benchmarking.
# Deploys a vLLM aggregated backend with a small model for smoke testing.
# Worker replicas scale to match available GPUs (1 GPU per replica via DRA).
#
# Target overlays require K8s 1.34+ with nvidia-dra-driver-gpu, so worker
# GPUs are requested through a DRA ResourceClaimTemplate rather than a raw
# resources.limits entry.
#
# Pod scheduling (nodeSelector / tolerations / resourceClaims bindings) is
# injected programmatically from Go (see applyInferenceWorkerScheduling in
# inference_perf_constraint.go) so taint values with YAML-special
# characters cannot break the template.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: ${DEPLOYMENT_NAME}
  namespace: ${NAMESPACE}
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      envs:
        - name: SERVED_MODEL_NAME
          value: ${MODEL}
        - name: DYN_STORE_KV
          value: mem
        - name: DYN_EVENT_PLANE
          value: zmq
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:0.9.0
    VllmDecodeWorker:
      componentType: worker
      replicas: ${GPU_COUNT}
      envs:
        - name: DYN_STORE_KV
          value: mem
        - name: DYN_EVENT_PLANE
          value: zmq
      resources:
        claims:
          - name: gpu
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:0.9.0
          workingDir: /workspace/examples/backends/vllm
          command: ["python3", "-m", "dynamo.vllm"]
          args: ["--model", "${MODEL}"]
