# KAI Scheduler queue for inference benchmark workloads.
# Queue name is templated via ${QUEUE_NAME} and supplied by the Go caller.

apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: ${QUEUE_NAME}
  namespace: ${NAMESPACE}
spec:
  parentQueue: default-parent-queue
  resources:
    gpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    cpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    memory:
      limit: -1
      overQuotaWeight: 1
      quota: 0
