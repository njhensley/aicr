# DRA ResourceClaimTemplate for the inference benchmark workload.
# One instance is allocated per worker pod (1 GPU each) by the Dynamo operator
# when a pod references the claim via extraPodSpec.resourceClaims.
# Must stay in sync with inferenceClaimTemplateName in inference_perf_constraint.go.

apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: ${CLAIM_TEMPLATE_NAME}
  namespace: ${NAMESPACE}
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.nvidia.com
            allocationMode: ExactCount
            count: 1
