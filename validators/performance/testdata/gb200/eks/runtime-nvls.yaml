# NCCL all-reduce TrainingRuntime for GB200 on EKS, NVLS-transport variant.
#
# Validates Multi-Node NVLink (MNNVL / NVLS — NVLink SHARP) across an NVL72
# UltraServer's IMEX domain. MNNVL is enabled via NCCL_NVLS_ENABLE=1 and the
# aws-ofi-nccl plugin is disabled (NCCL_NET_PLUGIN=none) so NCCL cannot fall
# back to EFA silently — if NVLS does not engage, the test fails loudly via
# validators/performance/nccl_all_reduce_bw_constraint.go:verifyTransportFromLogs
# rather than silently reporting an EFA bandwidth number.
#
# IMEX wiring is handled by the validator itself: before the TrainJob is
# applied, applyNCCLComputeDomain() creates a resource.nvidia.com/v1beta1
# ComputeDomain CR in this namespace. The NVIDIA DRA driver reconciles the
# CR into a ResourceClaimTemplate named "nccl-all-reduce-imex" (matching
# ncclIMEXClaimTemplateName in the validator Go code), and the worker pods
# below reference that template via resourceClaims. At pod admission the
# kubelet therefore mounts /dev/nvidia-caps-imex-channels into each worker,
# which is what MNNVL needs to open NVLS multicast groups across nodes.
#
# Cluster prerequisite: nvidia-dra-driver-gpu must be installed with the
# resource.nvidia.com/v1beta1 ComputeDomain CRD present. Without it the
# validator's CR creation fails up front with a clear NotFound error.
apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: nccl-all-reduce-runtime
  namespace: ${NAMESPACE}
  labels:
    trainer.kubeflow.org/framework: mpi
spec:
  mlPolicy:
    mpi:
      mpiImplementation: OpenMPI
      numProcPerNode: ${GPU_COUNT_PER_NODE}
      runLauncherAsNode: false
      sshAuthMountPath: /tmp/mpi-keys
  template:
    spec:
      network:
        enableDNSHostnames: true
        publishNotReadyAddresses: true
      replicatedJobs:
      - name: launcher
        replicas: 1
        template:
          spec:
            template:
              spec:
                tolerations:
                - operator: Exists
                initContainers:
                - name: fix-ssh-perms
                  image: public.ecr.aws/hpc-cloud/nccl-tests:cuda12.8.1-efa1.43.2-ofiv1.16.3-ncclv2.27.7-1-testsv2.16.9
                  command:
                  - /bin/sh
                  - -c
                  - |
                    mkdir -p /root/.ssh
                    cp /tmp/mpi-keys/id_rsa /root/.ssh/id_rsa
                    cp /tmp/mpi-keys/authorized_keys /root/.ssh/authorized_keys
                    chmod 700 /root/.ssh
                    chmod 600 /root/.ssh/id_rsa /root/.ssh/authorized_keys
                  volumeMounts:
                  - name: mpi-ssh-auth
                    mountPath: /tmp/mpi-keys
                    readOnly: true
                  - name: ssh-config
                    mountPath: /root/.ssh
                containers:
                - name: node
                  image: public.ecr.aws/hpc-cloud/nccl-tests:cuda12.8.1-efa1.43.2-ofiv1.16.3-ncclv2.27.7-1-testsv2.16.9
                  # LD_LIBRARY_PATH and PATH intentionally NOT overridden: the
                  # image default covers everything needed. NCCL_NET_PLUGIN=none
                  # below keeps the aws-ofi-nccl plugin from being dlopen'd
                  # even though its directory is on the image's LD_LIBRARY_PATH.
                  command:
                  - /opt/amazon/openmpi/bin/mpirun
                  - -np
                  - "${GPU_COUNT}"
                  - --allow-run-as-root
                  - -bind-to
                  - none
                  - --mca
                  - plm_rsh_agent
                  - ssh
                  - --mca
                  - plm_rsh_args
                  - -o StrictHostKeyChecking=no -o ConnectionAttempts=10
                  - -x
                  - LD_LIBRARY_PATH
                  - -x
                  - PATH
                  # INFO emits the "NVLS multicast support is available"
                  # hardware-capability banner and, when NCCL actually builds
                  # an NVLS communicator, a "NVLS comm 0x<addr>" init line.
                  # verifyTransportFromLogs greps the latter as proof of use
                  # (per-channel "[send] via NVLS" lines were dropped in
                  # NCCL 2.27).
                  - -x
                  - NCCL_DEBUG=INFO
                  # Force MNNVL/NVLS on. If the IMEX domain isn't wired up,
                  # NCCL initialization will surface the error loudly.
                  - -x
                  - NCCL_NVLS_ENABLE=1
                  # Disable the NET plugin so NCCL cannot fall back to EFA.
                  - -x
                  - NCCL_NET_PLUGIN=none
                  - -x
                  - NCCL_SOCKET_IFNAME=eth0
                  - -x
                  - NCCL_IGNORE_DISABLED_P2P=1
                  - /opt/nccl-tests/build/${TEST_TYPE}
                  - -b
                  - ${MIN_MESSAGE_SIZE}
                  - -e
                  - ${MAX_MESSAGE_SIZE}
                  - -f
                  - "2"
                  - -g
                  - "1"
                  resources:
                    limits:
                      cpu: "2"
                      memory: 128Mi
                  volumeMounts:
                  - name: ssh-config
                    mountPath: /root/.ssh
                volumes:
                - name: ssh-config
                  emptyDir: {}
      - name: node
        template:
          spec:
            template:
              spec:
                # IMEX channel claim: the DRA driver auto-generated this
                # ResourceClaimTemplate (name matches ncclIMEXClaimTemplateName
                # in the validator Go code) when the ComputeDomain CR was
                # reconciled. Without this block, /dev/nvidia-caps-imex-channels
                # would not be mounted and NCCL would fail with
                # "Cuda failure 800 'operation not permitted'" at MNNVL init.
                resourceClaims:
                - name: imex-channel
                  resourceClaimTemplateName: nccl-all-reduce-imex
                initContainers:
                - name: fix-ssh-perms
                  image: public.ecr.aws/hpc-cloud/nccl-tests:cuda12.8.1-efa1.43.2-ofiv1.16.3-ncclv2.27.7-1-testsv2.16.9
                  command:
                  - /bin/sh
                  - -c
                  - |
                    mkdir -p /root/.ssh
                    cp /tmp/mpi-keys/authorized_keys /root/.ssh/authorized_keys
                    chmod 700 /root/.ssh
                    chmod 600 /root/.ssh/authorized_keys
                  volumeMounts:
                  - name: mpi-ssh-auth
                    mountPath: /tmp/mpi-keys
                    readOnly: true
                  - name: ssh-config
                    mountPath: /root/.ssh
                containers:
                - name: node
                  image: public.ecr.aws/hpc-cloud/nccl-tests:cuda12.8.1-efa1.43.2-ofiv1.16.3-ncclv2.27.7-1-testsv2.16.9
                  command: ["/usr/sbin/sshd", "-De"]
                  resources:
                    claims:
                    - name: imex-channel
                    limits:
                      nvidia.com/gpu: ${GPU_COUNT_PER_NODE}
                    requests:
                      nvidia.com/gpu: ${GPU_COUNT_PER_NODE}
                  securityContext:
                    capabilities:
                      add: ["IPC_LOCK"]
                  volumeMounts:
                  - name: ssh-config
                    mountPath: /root/.ssh
                  - name: dshm
                    mountPath: /dev/shm
                volumes:
                - name: ssh-config
                  emptyDir: {}
                - name: dshm
                  emptyDir:
                    medium: Memory
      successPolicy:
        operator: All
        targetReplicatedJobs:
        - launcher
