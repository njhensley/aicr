# Workaround: Disable KAI scheduler runtimeClassName injection.
#
# GPU Operator v25.10.0+ sets nvidia as the default containerd runtime.
# KAI scheduler's admission webhook injects runtimeClassName: nvidia into
# GPU pods, which activates the management.nvidia.com CDI path and fails
# with "unresolvable CDI devices". Setting gpuPodRuntimeClassName to empty
# disables this injection.
#
# The Helm chart template uses '| default "nvidia"' which ignores empty
# string values, so we must patch the Config CR after helm install.
#
# Tracked upstream: https://github.com/NVIDIA/KAI-Scheduler/pull/1035
# Remove this workaround once the fix is backported to the v0.12 branch.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kai-disable-runtime-class-injection
  namespace: kai-scheduler
  labels:
    app.kubernetes.io/managed-by: aicr
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: kai-operator
      restartPolicy: Never
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - operator: Exists
      containers:
        - name: patch
          image: registry.k8s.io/kubectl:v1.34.0
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - kubectl
            - patch
            - configs.kai.scheduler
            - kai-config
            - -n
            - kai-scheduler
            - --type
            - merge
            - -p
            - '{"spec":{"admission":{"gpuPodRuntimeClassName":""}}}'
