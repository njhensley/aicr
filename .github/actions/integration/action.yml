name: 'Integration Tests'
description: 'Build binary and run CLI integration tests (tools/e2e)'

inputs:
  go_version:
    description: 'Go version to install (e.g., 1.25)'
    required: true
  goreleaser_version:
    description: 'GoReleaser version (from .settings.yaml)'
    required: true
  helm_version:
    description: 'Helm version to install (e.g., v4.1.0)'
    required: false
    default: 'v4.1.1'
  chainsaw_version:
    description: 'Chainsaw version to install (e.g., v0.2.14)'
    required: false
    default: 'v0.2.14'
  chainsaw_sha256:
    description: 'Chainsaw SHA256 checksum for linux/amd64 (from .settings.yaml)'
    required: false
    default: 'f2f4a3f9a541d65db12f5c910950758f7d56fae20ad5b1272cdc271c9568443e'

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
      with:
        go-version: '${{ inputs.go_version }}'
        cache: true
        cache-dependency-path: |
          go.sum
          vendor/modules.txt
        check-latest: true

    - name: Setup build tools
      uses: ./.github/actions/setup-build-tools
      with:
        install_goreleaser: 'true'
        goreleaser_version: '${{ inputs.goreleaser_version }}'
        install_helm: 'true'
        helm_version: '${{ inputs.helm_version }}'
        install_chainsaw: 'true'
        chainsaw_version: '${{ inputs.chainsaw_version }}'
        chainsaw_sha256: '${{ inputs.chainsaw_sha256 }}'

    - name: Run Integration Tests
      shell: bash
      env:
        GOFLAGS: -mod=vendor
      run: ./tools/e2e
