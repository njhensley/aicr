name: GPU Smoke Test (nvkind + T4)

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # Every 6 hours (4x daily)
  push:
    branches:
      - "pull-request/*"
    paths:
      - '.github/workflows/gpu-smoke-test.yaml'
      - '.github/actions/gpu-cluster-setup/**'
      - '.github/actions/gpu-smoke-test/**'
  workflow_dispatch: {}  # Allow manual runs

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  gpu-smoke-test:
    name: GPU Smoke Test (nvkind + T4)
    runs-on: linux-amd64-gpu-t4-latest-1
    timeout-minutes: 30

    env:
      KIND_CLUSTER_NAME: gpu-smoke-test

    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: GPU Smoke Test
        uses: ./.github/actions/gpu-smoke-test
        with:
          expected-gpu-model: T4

      - name: GPU Test Cleanup
        if: always()
        uses: ./.github/actions/gpu-test-cleanup
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
