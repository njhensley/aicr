name: Renovate

# Self-hosted Renovate runner. Configuration: .github/renovate.json5
# Modeled on NVIDIA/gpu-operator/.github/workflows/renovate.yaml.
# Uses GITHUB_TOKEN (no PAT/App): the repo's /ok reviewer-comment policy
# re-fires CI on bot PRs, sidestepping GitHub's GITHUB_TOKEN-no-trigger limitation.

on:
  schedule:
    # Mondays 09:00 UTC. Patch auto-merge keeps drain-rate high without daily noise.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warn
      dryRun:
        description: "Run in dry-run mode (no PRs created)"
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Do NOT pass `configurationFile:` here. That input maps to RENOVATE_CONFIG_FILE
      # (the runner's *global* config), and Renovate ALSO auto-discovers
      # .github/renovate.json5 as the *repo* config. If both point at the same file
      # every customManager is applied twice and per-package PRs get duplicated.
      #
      # `renovate-version` carries the tag AND digest pin: the action constructs
      # the image as `${renovate-image}:${renovate-version}`, so passing
      # `43@sha256:...` produces a digest-verified reference. Keep this digest
      # in lockstep with RENOVATE_VALIDATOR_IMAGE in the Makefile.
      - name: Run Renovate
        uses: renovatebot/github-action@f66d8679fcfcfa051abde6e7a623007173bf5164  # v46.1.12
        with:
          renovate-version: '43@sha256:00185c0d63462acec8331cc9a94dcd74a763f2765fca0edcc3ff568af1dc8104'
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
          RENOVATE_ONBOARDING: "false"
          # Allow the chainsaw post-upgrade hook (refreshes per-arch SHA256s).
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '["^\\./tools/update-chainsaw-checksums "]'
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
